<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="buildingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.6"/>
    </linearGradient>
  </defs>
  <rect width="300" height="200" fill="url(#sky)"/>
  <!-- Stars -->
  <circle cx="20" cy="20" r="1" fill="white" opacity="0.7"/>
  <circle cx="60" cy="10" r="1.2" fill="white" opacity="0.8"/>
  <circle cx="150" cy="15" r="1" fill="white" opacity="0.6"/>
  <circle cx="250" cy="8" r="1.3" fill="white" opacity="0.9"/>
  <circle cx="290" cy="25" r="1" fill="white" opacity="0.7"/>
  <circle cx="100" cy="30" r="0.8" fill="white" opacity="0.5"/>
  <circle cx="200" cy="20" r="1" fill="white" opacity="0.8"/>
  <!-- Main building (Geisel Library style) -->
  <rect x="110" y="100" width="80" height="70" fill="url(#buildingGrad)" rx="2"/>
  <rect x="90" y="110" width="120" height="60" fill="url(#buildingGrad)" rx="2"/>
  <rect x="70" y="120" width="160" height="50" fill="url(#buildingGrad)" rx="2"/>
  <rect x="60" y="140" width="180" height="30" fill="rgba(100,120,180,0.5)" rx="2"/>
  <!-- Windows -->
  <rect x="120" y="108" width="8" height="10" fill="rgba(255,240,100,0.7)" rx="1"/>
  <rect x="136" y="108" width="8" height="10" fill="rgba(255,240,100,0.7)" rx="1"/>
  <rect x="152" y="108" width="8" height="10" fill="rgba(255,240,100,0.7)" rx="1"/>
  <rect x="168" y="108" width="8" height="10" fill="rgba(255,240,100,0.4)" rx="1"/>
  <!-- Caption -->
  <text x="150" y="185" font-family="Inter,sans-serif" font-size="11" font-weight="600"
        fill="rgba(147,197,253,0.9)" text-anchor="middle">UC San Diego</text>
</svg>
