<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1"/>
    </linearGradient>
    <clipPath id="circle-clip">
      <circle cx="100" cy="100" r="100"/>
    </clipPath>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <!-- Body -->
  <ellipse cx="100" cy="160" rx="55" ry="45" fill="rgba(255,255,255,0.2)" clip-path="url(#circle-clip)"/>
  <!-- Head -->
  <circle cx="100" cy="78" r="38" fill="rgba(255,255,255,0.3)"/>
  <!-- Face highlights -->
  <circle cx="88" cy="74" r="5" fill="rgba(255,255,255,0.6)"/>
  <circle cx="112" cy="74" r="5" fill="rgba(255,255,255,0.6)"/>
  <path d="M 88 94 Q 100 104 112 94" stroke="rgba(255,255,255,0.6)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Initial -->
  <text x="100" y="175" font-family="Inter,sans-serif" font-size="14" font-weight="600"
        fill="rgba(255,255,255,0.9)" text-anchor="middle">L G</text>
</svg>
