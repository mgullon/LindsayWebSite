<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
  </defs>
  <rect width="300" height="200" fill="url(#bg)" rx="8"/>
  <!-- Grid floor -->
  <line x1="0" y1="160" x2="300" y2="160" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
  <line x1="0" y1="180" x2="300" y2="180" stroke="rgba(124,58,237,0.2)" stroke-width="1"/>
  <!-- Robot character -->
  <!-- Body -->
  <rect x="120" y="90" width="60" height="55" fill="#7c3aed" rx="8"/>
  <!-- Head -->
  <rect x="128" y="62" width="44" height="36" fill="#3b82f6" rx="6"/>
  <!-- Eyes -->
  <rect x="134" y="72" width="12" height="10" fill="#0ff" rx="2" opacity="0.9"/>
  <rect x="154" y="72" width="12" height="10" fill="#0ff" rx="2" opacity="0.9"/>
  <!-- Eye glow -->
  <rect x="137" y="75" width="6" height="4" fill="white" rx="1" opacity="0.8"/>
  <rect x="157" y="75" width="6" height="4" fill="white" rx="1" opacity="0.8"/>
  <!-- Antenna -->
  <line x1="150" y1="62" x2="150" y2="50" stroke="#f43f5e" stroke-width="2"/>
  <circle cx="150" cy="47" r="4" fill="#f43f5e"/>
  <!-- Arms -->
  <rect x="96" y="95" width="25" height="12" fill="#5b21b6" rx="6"/>
  <rect x="179" y="95" width="25" height="12" fill="#5b21b6" rx="6"/>
  <!-- Legs -->
  <rect x="128" y="142" width="16" height="22" fill="#5b21b6" rx="4"/>
  <rect x="156" y="142" width="16" height="22" fill="#5b21b6" rx="4"/>
  <!-- Body panel -->
  <rect x="130" y="100" width="40" height="30" fill="rgba(59,130,246,0.4)" rx="4"/>
  <circle cx="150" cy="115" r="8" fill="rgba(0,255,255,0.3)" stroke="#0ff" stroke-width="1.5"/>
  <!-- Lab walls -->
  <rect x="0" y="0" width="100" height="200" fill="rgba(124,58,237,0.05)"/>
  <rect x="200" y="0" width="100" height="200" fill="rgba(59,130,246,0.05)"/>
  <!-- Title -->
  <text x="150" y="185" font-family="Inter,sans-serif" font-size="10" font-weight="600"
        fill="rgba(167,139,250,0.9)" text-anchor="middle">Blink! – Escape Room Game</text>
</svg>
